name: RexTennis
options:
  bundleIdPrefix: com.taicheng525
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.0.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""

targets:
  RexTennis:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: RexTennis
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taicheng525.RexTennis
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Support/BridgingHeader.h

  RexTennisTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: RexTennis
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.taicheng525.RexTennisTests

schemes:
  RexTennis:
    build:
      targets:
        RexTennis: all
        RexTennisTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - RexTennisTests
